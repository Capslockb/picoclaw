server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    location = / {
        default_type text/html;
        return 200 "<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>PicoClaw Dashboard Hub</title><style>body{font-family:system-ui,Arial;max-width:980px;margin:20px auto;padding:0 14px}h1{margin:0 0 10px}ul{line-height:1.8}.ok{color:#0a7}.muted{color:#666}</style></head><body><h1>PicoClaw Dashboard Hub</h1><p class=\"muted\">Gateway is online. Use links below.</p><ul><li><a href=\"/health\">/health</a> <span class=\"ok\">(Gateway health)</span></li><li><a href=\"/ready\">/ready</a> <span class=\"ok\">(Gateway readiness)</span></li><li><a href=\"/pico\">/pico</a> <span class=\"ok\">(Pico webhook info)</span></li><li><a href=\"/dash/control\">/dash/control</a> (Control-plane dashboard from gateway)</li><li><a href=\"/legacy-dashboard\">/legacy-dashboard</a> (Lightweight gateway dashboard)</li><li><a href=\"/dash/system\">/dash/system</a> (OrangePi Dashboard, port 5000)</li><li><a href=\"/dash/nas\">/dash/nas</a> (NAS Dashboard, port 8088)</li></ul></body></html>";
    }

    location = /pico {
        default_type application/json;
        return 200 '{"ok":true,"endpoint":"/pico/","note":"Pico webhook endpoint is active; expects channel traffic"}';
    }

    location = /ready {
        default_type application/json;
        return 200 '{"status":"ok","via":"nginx","upstream":"picoclaw gateway"}';
    }

    location ~ ^/dash/control/?$ {
        rewrite ^ / break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dash/system {
        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dash/nas {
        proxy_pass http://127.0.0.1:8088/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
